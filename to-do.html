<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
    <link rel="stylesheet" href="to-do.css">
</head>
<body>

    <div class="container">
    <h1>To-Do-App</h1>
    <input type="text" id="taskInput" placeholder="Enter Your Task">
    <button type="button" id="addBtn" class="button">ADD</button>
    </div>

    <div class="task" id="taskContainer"></div>

<div class ="delete-btn">
    <button type="button" id="deleteAllBtn" class="delete" onclick='(()=>{
        localStorage.clear();
        document.getElementsByClassName("task")[0].innerHTML = "";
        document.getElementsByClassName("delete")[0].style.visibility = "hidden";
        })()'>Delete All</button>
</div>

    <script src="to-do.js"></script>
</body>
</html>
